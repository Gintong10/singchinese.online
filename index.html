<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>singchinese</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="bg-pattern" aria-hidden="true"></div>

    <header class="site-header">
      <div class="site-header-bar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">唱</span>
          <div>
            <h1>singchinese</h1>
          </div>
        </div>

        <div class="header-spotify-auth">
          <div class="spotify-actions header-spotify-actions" id="spotifyAuthWrap">
            <button
              type="button"
              id="spotifyLoginBtn"
              class="btn btn-spotify-oauth"
              aria-label="Sign in with Spotify"
            >
              <!-- Spotify glyph (Simple Icons, MIT) -->
              <svg class="spotify-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.319.529-.994.692-1.523.377-4.172-2.522-9.428-2.65-15.604-.593-.572.176-1.177-.161-1.354-.733-.176-.572.161-1.177.733-1.354 6.786-2.063 12.538-1.911 17.218.593.529.319.692.994.377 1.523zm1.514-3.543c-.399.651-1.248.846-1.899.447-4.775-2.939-12.066-3.105-17.717-.853-.696.214-1.425-.182-1.639-.878-.214-.696.182-1.425.878-1.639 6.312-1.926 14.047-1.735 19.654.853.651.399.846 1.248.447 1.899zm.129-3.688c-.574.935-1.796 1.216-2.732.642-5.457-3.351-13.742-3.551-20.177-.926-.784.241-1.608-.205-1.849-.989-.241-.784.205-1.608.989-1.849 7.172-2.195 16.215-1.973 22.406.926.935.574 1.216 1.796.642 2.732z"
                />
              </svg>
              <span class="btn-spotify-label">Sign in</span>
            </button>
            <div id="spotifySessionRow" class="spotify-session" hidden>
              <span id="spotifyPremiumBadge" class="premium-badge premium-badge-session" hidden></span>
              <div class="spotify-session-info">
                <span class="spotify-signed-prefix">Signed in as:</span>
                <span id="spotifyDisplayName" class="spotify-display-name"></span>
              </div>
              <button type="button" id="spotifyLogoutBtn" class="btn btn-ghost btn-sm">
                Log out
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <div id="spotifySetupBanner" class="setup-banner" role="status" hidden>
        <p class="setup-banner-title">Spotify sign-in is not configured yet</p>
        <p class="setup-banner-body">
          Open <code>js/spotify-config.js</code> and paste your app’s <strong>Client ID</strong> from the
          <a href="https://developer.spotify.com/dashboard" target="_blank" rel="noopener noreferrer"
            >Spotify Developer Dashboard</a
          >. Add this redirect URI there (exact match), then reload this page:
        </p>
        <p class="setup-banner-uri"><code id="setupBannerRedirect"></code></p>
      </div>

      <section class="panel controls-panel" aria-label="Playback">
        <div class="spotify-hero">
          <label class="field paste-field spotify-search-field">
            <input
              type="search"
              id="spotifyTrackSearch"
              class="input-track spotify-search-input"
              autocomplete="off"
              spellcheck="false"
              placeholder="What do you want to play?"
              aria-label="Search Spotify"
              role="combobox"
              aria-autocomplete="list"
              aria-controls="spotifySearchResults"
              aria-expanded="false"
            />
            <div id="spotifySearchResults" class="spotify-search-results" hidden role="listbox"></div>
            <div id="spotifySelectedRow" class="spotify-selected-row" hidden>
              <span class="spotify-selected-prefix">Playing:</span>
              <span id="spotifySelectedLabel" class="spotify-selected-label"></span>
              <button type="button" id="spotifyClearTrackBtn" class="btn btn-ghost btn-sm">
                Clear
              </button>
            </div>
          </label>

          <p id="spotifyHint" class="spotify-hint"></p>
        </div>

        <div class="player player-classic">
          <div class="scrub-wrap">
            <span id="timeCurrent" class="time">0:00</span>
            <input
              type="range"
              id="seek"
              class="seek"
              min="0"
              max="1000"
              value="0"
              aria-label="Seek"
            />
            <span id="timeTotal" class="time">0:00</span>
          </div>
          <div class="player-transport">
            <button type="button" id="skipBackBtn" class="btn btn-skip" aria-label="Back 5 seconds">
              <span aria-hidden="true">−5s</span>
            </button>
            <button type="button" id="playBtn" class="btn btn-primary btn-play-main" aria-pressed="false">
              <span class="btn-icon play-icon" aria-hidden="true">▶</span>
              <span class="btn-icon pause-icon" aria-hidden="true">⏸</span>
              <span class="btn-label-play">Play</span>
              <span class="btn-label-pause">Pause</span>
            </button>
            <button type="button" id="skipForwardBtn" class="btn btn-skip" aria-label="Forward 5 seconds">
              <span aria-hidden="true">+5s</span>
            </button>
          </div>
          <div class="player-status">
            <span id="modeBadge" class="badge" role="status"></span>
          </div>
        </div>
      </section>

      <section class="panel lyrics-panel" aria-label="Lyrics">
        <div id="lyricsScroll" class="lyrics-scroll">
          <ul id="lyricsList" class="lyrics-list"></ul>
        </div>
      </section>
    </main>

    <!-- Load order matters: config → spotify module → app (no defer; avoids missing SingChineseSpotify when app binds listeners). -->
    <script src="js/spotify-config.js"></script>
    <script src="js/spotify.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
